  text: 欽定四庫全書經部三
  hash: sha256:cb15cdc798f7ad6d97c6a06d82684919eb432f17fa36f28d4b42e53a43363542
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1c0025_WYG_000-1a, image: WYG0075/WYG0075-0597a.png}
body:
  text: 詩考詩類提要臣等謹案詩考一卷宋王應麟撰隋書經籍志云齊詩魏代已亡魯詩亡於西晉韓詩雖存無傳之者今三家詩惟韓詩外傳僅存所謂韓故韓內傳韓說者亦並佚矣應麟檢諸書所引集以成帙曰韓詩曰魯詩曰齊詩以存三家逸文又旁搜廣討曰詩異字異義曰逸詩以附綴其後每條各著其所出所引韓詩較夥齊魯二家僅寥寥數條蓋韓最後亡唐以來注書之家引其說者多也卷末别為補遺以掇拾所缺其搜輯頗為勤摯明董斯張嘗摘其遺漏十九條其中子華子清風婉兮一條本北宋僞書不得謂之疏略近人因應麟之書撰三家詩拾遺十卷其所採録又多斯張之所未搜併摘應麟所録逸詩如楚詞之駕辨夏侯元辨樂論之網罟豐年穆天子傳之黃竹吕氏春秋之燕燕破斧葛天八闋尚書大傳之晳陽南陽初慮朱干苓落歸來縵縵皆子書雜說且不當録及殷以前所言亦不為無理然古書散佚搜採為難後人踵事增修較創始易於為力篳路藍縷終當以應麟為首庸也乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀詩考自序漢言詩者四家師異指殊賈逵撰齊魯韓與毛氏異同梁崔靈恩采三家本為集注今惟毛傳鄭箋孤行韓㢙存外傳而魯齊詩亡久矣諸儒說詩一以毛鄭為宗未有參考三家者獨朱文公集傳閎意眇指卓然千載之上言關雎則取匡衡柏舟婦人之詩則取劉向笙詩有聲無辭則取儀禮上天甚神則取戰國䇿何以恤我則取左氏傳抑戒自警昊天有成命道成王之德則取國語陟降庭止則取漢書注賓之初筵飲酒悔過則取韓詩序不可休思是用不就彼岨者岐皆從韓詩禹敷下土方又證諸楚辭一洗末師專已守殘之陋學者諷詠涵濡而自得之躍如也文公語門人文選注多韓詩章句嘗欲寫出應麟竊觀傳記所述三家緒言尚多有之罔羅遺軼傅以說文爾雅諸書稡為一編以扶微學廣異義亦文公之意云爾讀集傳者或有考於斯王應麟伯厚甫自序
