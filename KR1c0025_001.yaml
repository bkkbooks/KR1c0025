body:
  text: 詩考宋王應麟撰韓詩燕韓嬰作內外傳數萬言頗與齊魯間殊然歸一也漢藝文志韓故三十六卷內傳四卷外傳六卷説四十一卷隋經籍志韓詩二十二卷嶭氏章句後漢嶭漢世習韓詩父子以章句著名韓詩翼要十卷漢侯苞撰梁有韓詩譜二卷唐藝文志韓詩卜商序韓嬰注二十二卷又外傳十卷隋志韓詩存無傳者崇文總目韓嬰之書至唐猶在今存外傳十篇非嬰傳詩之詳者遺説時見於他書與毛説絶異壁正義云齊韓之徒以詩經為章句與毛異耳非有中舊本可據朝説之曰説韓詩者謂其序子夏所作婉朝公武曰外傳雖非其解經之深者然文辭清有先秦風關雎詩人言雎鳩貞潔慎匹以聲相求隱蔽乎無人之處故人君退朝入于私宮后妃御見有度應門擊柝鼓人上堂退反燕處體安志明今時大人內傾于色賢人見其萌故詠關雎説淑女正容儀以刺時嶭君章句後漢書明帝詔應門失守關雎刺世注之又馮衍傳注嶭夫子章句曰云云以聲相求必於河洲蔽隱無人之處故人君動靜退朝云云妃后御見去留有度云大人見其萌窈窕貞專貌淑女奉順坤德成其紀綱文選注卷朝説之論云齊魯韓以關雎葛覃耳鵲巢采蘩采蘋騶虞鹿鳴四牡皇皇者華皆為文王詩葛覃萋萋盛也文選注刈取也濩瀹也釋文卷耳頃筐欹筐也罍天子以玉飾諸侯大夫皆以黃金飾士以梓釋文金罍大夫器也天子以玉諸侯大夫皆以金士以梓一升曰爵爵盡也足也二升曰觚觚寡也飲當寡少三升曰觶觶適也飲當自適也四升曰角角觸也不能自適觸罪過也五升曰散散訕也飲不自節為人所謗訕也總名曰爵其實曰觴觴者餉也觥亦五升所以罰不敬觥廓也所以著明之貌君子有過廓然著明非所以餉不得名觴韓詩説正義又儀禮疏觥容五升釋文云辭也文選注朻木釋文云毛氏字與三家異者動以百數正義兔罝施于中馗馗中九交之道也嶭君章句文選注芣苡傷夫有惡疾也文選注朝説之論韓詩序傷夫也直曰車前瞿曰芣苡釋文芣苡木名實似李説文通釋芣苡澤寫也芣苡臭惡之菜詩人傷其君子有惡疾人道不通求己不得發憤而作以事興芣苡雖臭惡乎我猶采取而不已者以興君子雖有惡疾我猶守而不離去也嶭君章句文選注漢廣悅人也文選注韓詩序不可休思外傳遊女謂漢神也言漢神時見不可求而得之嶭君章句文選注江之漾矣漾長也同上曰嶭君説文作羕汝墳辭家也後漢書注愵如調飢釋文王室如􅛚雖則如􅛚赬赤也􅛚烈火也孔甚也邇近也言魴魚勞則尾赤君子勞苦則顔色變以王室政教如烈火矣猶觸冒而仕者以父母甚迫近飢寒之憂為此祿仕嶭君章句後漢周磐誦詩至汝墳之卒章慨然而歎注云采蘋沈者曰蘋浮者曰藻釋文于以鬺之唯錡及釜漢書注顔師古曰鬺亨也甘棠蔽茀甘棠外傳勿剗勿伐釋文切剗初簡勿剗勿敗集韻昔召公述職當民事時舍於棠下而聽斷焉是時人皆得其所後世思其仁恩至呼不伐甘棠漢書王吉傳吉學韓詩蔽芾甘棠云云傳曰自陜以東者周公主之自陜以西者召公主之召公述職當桑蠶之時不欲變民事故不入邑中舍于甘棠之下而聽斷焉陜間之人皆得其所是故後世思而歌詠之説苑羔羊小者曰羔大者曰羊素喻潔白絲喻屈柔紽數名也詩人賢仕為大夫者言其德能稱有潔白之性屈柔之行進退有度數也嶭君章句後漢書注逶迤公正貌釋文褘隋即委蛇出韓詩內傳隸釋衡方碑云褘隋在公摽有梅釋文莩有梅莩零落也孟子注音義云韓詩也逮願也釋文小星實命不同實有也釋文江有泛説文作洍一溢一否曰渚釋文水一溢而為渚文選注章嶭君句何彼茙矣釋文音戎騶虞天子掌鳥獸官異義韓魯説天周禮疏也賈誼新書騶者子之囿虞者囿之司獸者也天子佐輿十乘以明貴也㒃牲而食以優飽也虞人翼五豝以待一發所以復中也柏舟衛宣薑自誓所作李迃仲云如有殷憂文選注胡臷而微臷常也釋文燕燕衛定薑歸其娣送之而作李迃仲云定薑歸其婦補傳日月報我不術嶭君曰術法也文選注終風終風西風也浪起也釋文時風又且暴使己思益隆文選注嶭君章句説文作暴㙪㙪其陰天陰塵也董氏云説文同擊鼓契闊約束也釋文也文選注括句約束嶭君章于嗟敻兮不我信兮敻亦遠也釋文凱風簡簡黃鳥載好其音太平御覽雄雉雉耿介之鳥也嶭君章句文選注匏有苦葉至心曰厲釋文古者霜降逆女冰泮殺止韓詩傳肅周禮疏王論招招聲也釋文谷風密勿同心密勿僶俯也文選注無以下禮外傳違很也發亂也潰潰不善之貌釋文簡兮萬以夷狄大鳥羽正義説韓詩碩人扈扈美貌釋文萬大舞也初學記泉水祕彼泉水説文作泌飲餞于泥釋文送行飲酒曰餞嶭君章句文選注北門敦迫室人交遍䜅我就也説文作催釋文亦已焉哉外傳靜女靜貞也搔首躊躇嶭君曰躊躇躑躅也文選注新臺新臺有漼河水浘浘漼鮮貌浘浘盛貌音尾釋文嬿婉之求嬿婉好貌文選注暥婉説文作得此戚施嶭君曰戚施蟾蜍喻醜惡太平御覽柏舟實維我直直相當值也釋文牆有茨説文作薺不可揚也中冓中夜謂淫僻之言也揚猶道也釋文君子偕老他他德之美貌釋文邦之援也援取也同上鶉之奔奔左傳作賁賁奔奔強強乘匹之貌釋文人而無良外傳蝃蝀説文作螮蝀刺奔女也詩人言蝃蝀在東者邪色乘陽人君淫佚之徴臣子為君父隱藏故言莫之敢指韓詩序曰云云後漢書注乃如之人兮外傳相鼠止節無禮節也釋文載馳不由蹊遂而涉曰跋涉釋文尤非也文選注嶭君章句淇奧緑􅗨猗猗􅗨篇築也有邲君子邲美貌也僴美貌赫兮宣兮宣顯也釋文緑􅗨如簀簀積也嶭君曰簀緑䓯盛如積也䓯音竹文選注考盤考盤在干地下而黃曰干文選注干墝埆之處也碩人之􅧷􅧷美貌釋文曲景曰阿文選注碩人倩蒼白色盼黑色也退罷也濊濊流貌鱣鮪鱍鱍庶薑䡾䡾長貌庶士有桀健也釋文氓氓美貌釋文將辭也文選注履無咎言履幸也釋文吁嗟女兮外傳芄蘭垂帶萃兮垂貌能不我狎釋文伯兮偈桀侹也疾驅貌焉得喧草喧草忘憂也文選注黍離伯封作也離離黍貌也詩人求亡不得憂悶不識於物視彼黍離離然憂甚之時反以為稷之苗乃自知憂之甚也太平御覽昔尹吉甫信後妻之讒而殺孝子伯竒其弟伯封求而不得作黍離之詩陳思王植貪惡鳥論君子于役佸至也釋文作説文君子陽陽陶暢也嶭君章句書文選注後漢注揚之水戍舍也釋文中谷有蓷蓷茺蔚也釋文説云益母正義惙其泣矣外傳兔爰施羅於車上曰罿釋文張羅車上曰罿嶭君注太平御覽緇衣席儲也釋文大叔于田禽獸居之曰藪釋文兩驂左右騑驂嶭君章句注文選清人二矛重鷮釋文羔裘侯美也釋文恂直且侯彼己之子舍命不偷外傳同汾沮洳椒聊彼己之子左傳亦作彼己東門之墠有靖家室注靖善也言東門之外栗樹之下有善人可與成為室家也事類賦注太平御覽藝文類聚靖作靜子襟子寧不詒音詒寄也曾不寄問也釋文出其東門聊樂我魂魂神也釋文嶭又文選注君曰野有蔓草清揚䩊兮玉篇集韻青陽宛兮外傳溱洧溱與洧方洹洹兮音丸又後漢書注同蕳蓮也釋文詩人言溱與洧方盛流洹洹然謂三月桃花水下之時士與女方秉蘭兮秉執也當此盛流之時衆士與衆女方執蘭而拂除太平御覽三漢書注引韓詩傳云月桃花水鄭國之俗三月上已之溱洧兩水之上招魂續魄秉蘭草祓除不祥故詩人願與所説者俱往也後漢書注類嶭君注云藝文聚恂盱且樂恂盱樂貌也漢書同勺藥離草也言將離别贈此草也釋文雞鳴説人也蒼蠅之聲嶭君曰雞遠鳴蠅聲相似也太平御覽一本作讒人也嫙子之嫙兮嫙好貌釋文獸三歲曰肩後漢書注嶭君傳揖我謂我婘兮音權好貌釋文東方之日彼姝者子詩人言所説者顔色美盛若東方之日嶭君章句文選注門屛之間曰闥釋文南山橫由其畝東西耕曰橫南北耕曰由釋文盧泠盧泠泠董氏云獜獜説文作敝笱其魚遺遺言不能制也釋文載驅發旦也釋文猗嗟舞則纂兮言其舞則應雅樂也嶭君章句文選注四矢變兮變易也釋文葛屨纖纖女手纖纖女手之貌文選注攕攕説文作園有桃有章曲曰歌無章曲曰謠章句記初學伐檀順流而風曰淪淪文貌作釋文文選注從流何謂素餐素者質也人但有質朴而無治民之材名曰素餐尸祿者頗有所知善惡不言默然不語苟欲得祿而已譬如尸焉嶭君章句文選注蟋蟀歲聿其暮聿辭也莫晚也言君之年歲已晚也嶭君章句文選注綢繆見此邂覯邂覯不固之貌釋文鴇羽悠悠倉天外傳有杕之杜逝肯適我逝及也道周周右也釋文車鄰漢書作車轔寺人之伶使伶釋文駟驖漢書作四臷鸞在衡和在軾內傳經解注禮記升車則馬動馬動則鸞鳴鸞鳴則和應周禮疏小戎駟馬不著甲曰俴駟釋文蒹葭大渚曰沚嶭君章句文選注終南顔如渥沰沰赭也渥撻各反釋文外傳作赭晨風鷸彼晨風外傳作鴧説文東門之枌穀旦于嗟釋文衡門可以療飢外傳墓門訊諫也釋文防有鵲巢誰侜豫娓娓美也釋文心焉惕惕以為悅人爾雅注澤陂展轉伏枕文選注碩大且媕嶭君曰媕重頤也五撿反太平御覽匪風匪車揭兮中心􅜢兮古怛字説曰是非古之風也發發者是非古之車也揭揭者蓋傷之也漢書王吉傳吉學韓詩七月四之日舉趾至於四月始可舉足而耕太平御覽宇屋霤也向北向窗也釋文氷者窮谷陰氣所聚不泄則結而為伏陰初學記云韓詩説六月食鬱及蒮爾雅疏韓詩云鴟梟鸋鳺鳥名也鴟梟所以愛養其子者適以病之愛憐養其子者謂堅固其窠巢病之者謂不知託於大樹茂枝反敷之葦茢風至茢折巢覆有子則死有卵則破是其病也文選注徹彼桑杜口足為事曰拮據租積也釋文東山鸛水鳥巢處知風穴處知雨天將雨而蟻出壅土鸛鳥見之長鳴而喜嶭君章句文選注蒸在蓼薪力菊反衆薪也釋文縭帶也章句注文選破斧錡木屬銶鑿屬也釋文九罭取蝦芘也太平御覽四牡周道倭夷釋文注文選周道威夷嶭君曰威夷險也又作威遲文選注周道郁夷漢書地理志顔師古曰言使臣乘馬行於此道皇皇者華莘莘征夫外傳同國語説文伐木伐木廢朋友之道缺序曰勞者歌其事詩人伐木自苦其事故以為文鳥微物也文選注飢者歌食勞者歌事太平御覽志初學記古樂天保吉圭惟饎周禮蠟氏注疏曰鄭從三家詩儀禮注作為饎承受也章句文選注采薇昔始也釋文依依盛貌嶭君章句文選注杕杜檀車􅥕􅥕音同幝釋文年二十行役三十受兵六十還兵韓詩説從禮記正義又又詩正義曰二十役云云周禮疏湛露愔愔夜飲説文作懕懕愔愔和悅之貌釋文注文選夫飲之禮不脫屨而即序者謂之禮跣而上坐者謂之宴能飲者飲之不能飲者已謂之醧齊顔色均衆寡謂之沉閉門不出者謂之湎故君子可以宴可以醧不可以沉不可以湎初學記上文選注嶭君章句曰飲酒之禮下跣而坐者謂之宴齊顔色均衆寡謂之沉閉門不出容謂之湎離離長貌初學記蓁蓁者莪蓁蓁盛貌文選注韻嶭君曰云云集作葏葏六月元戎大戎謂兵車也車有大戎十乘謂車縵輪馬被甲衡扼之士盡有劎戟名曰陷軍之車所以冒突先啓敵家之行伍也章句注史記采芑佩玉上有蔥衡下有雙璜衝牙蠙珠以納其間周禮注引詩傳曰疏謂是韓詩國語注詩傳上有蔥絎車攻東有圃草嶭君曰圃博也有博大之茂草也文選注後漢書注東有囿草後漢馬融傳注奕奕盛貌文選注吉日駓駓俟俟後漢馬融傳注趨曰􅛖音鄙行曰騃嶭君章句文選注醴甜而不泲也文選注鴻雁八尺為板五板為堵五堵為雉韓詩説正義堵四十尺雉二百尺以板長八尺接五板而為堵接五堵而為雉韓詩傳注公羊傳劬數也釋文沔水讒言緣間而起文選注鶴鳴九皋九折之澤釋文祈父左傳作圻父有母之尸雍外傳白駒在彼穹谷嶭君曰穹谷深谷也文選注斯干如矢斯朸朸隅也旅即反如鳥斯翅也載衣之禘音同裼方釋文侯云示之也正義太子生以桑弧蓬矢六射上下四方內傳通白虎所以為世子何言世世不絶內傳注文選無羊或寢或訛訛覺也釋文節南山節視也憂心如炎監領也昊天不庸庸易也釋文騁馳也嶭君章句萬人顒顒仰天告訴嶭君章句文選注正月夢夢惡貌也釋文窘迫董氏引章句速速方穀夭夭是椓後漢蔡雍傳注韓詩亦同十月之交繁維司徒抑意也憗誾也讒口嗸嗸釋文雨無極正大夫刺幽王也雨無其極傷我稼穡劉諫議安世曰嘗讀韓詩云云薰胥以痡熏帥也胥相也痡病也言此無罪之人而使有罪者相帥而病之是其大甚後漢書注薰胥漢書注晉灼曰齊韓魯詩作薰薰帥也顔師古曰韓詩淪字作薰薰者謂相薰蒸小旻謀猶回釋文謀猷回嶭君曰也回邪僻謀猶回冗文選注訿訿不善之貌民雖靡腜猶無幾何釋文是用不就外傳小宛翰飛厲天嶭君曰厲刑也文選注哀我疹寡疹苦也宜犴宜獄鄉亭之繫曰犴朝廷曰獄釋文小辨惄焉如疛除又反釋文雚葦淠淠外傳巧言昊天大憮外傳僭始既減減少也釋文匪其止恭惟王之卭外傳躍躍毚兔躍躍往來貌獲得也言躍躍之毚兔謂狡兔數往來逃匿其迹有時遇犬得之韓嬰章句史記注何人斯我心施也施善也釋文盟牲所用天子諸侯以牛豕大夫以犬庶人以雞禮記正義許慎據韓詩云谷風將辭也文選注蓼莪怙賴也恃負也釋文大東嬥嬥公子音挑往來貌釋文采采衣服嶭君曰采采盛貌襄反也文選注嶭君曰太白晨出東方為啓明昏見西方為長庚史記索隱韓詩云四月歎征役也董氏云讀詩記百卉俱腓腓變也俱變而黃也亂離斯莫莫散也嶭君曰文選注小明眷眷懷顧文選注靜恭爾位外傳鼓鍾昭王之時作正義之鄭於中候握河紀注云昭王時鼓鍾之詩所為作者依三家為説也南夷之樂曰南四夷之樂唯南可以和於雅者以其人聲音及籥不僭差也後漢書注嶭君云王者舞六代之樂舞四夷之樂大德廣之所及內傳注文選楚茨禮義卒度外傳馥芬孝祀嶭君曰馥香貌也文選注信南山維禹敶之周禮稍人注疏云韓詩畇畇原隰周禮疏壃埸有瓜外傳甫田箌彼甫田箌卓也音同田釋文云爾雅箌大也疏作圃説文卓大也大田卜畀炎火卜報也釋文有弇淒淒興雲祁祁外傳同漢書鴛鴦戢揵也揵其噣於左也莝委也釋文頍辨先集惟霰霰霙也嶭君章句御文選注太平覽霰英也宋書志符瑞車舝以慍我心慍恚也釋文青蠅構亂也釋文賓之初筵衛武公飲酒悔過也言賓客初就筵之時賓主秩秩然俱謹敬也賓既醉止不知其為惡也後漢書注威儀眅眅蒲板反善貌釋文魚藻頒衆貌釋文采菽便便左右間雅之貌纚筰也釋文纚繫也文選注福祿肶之釋文角弓人之無良良善也言王者所為無有善者各相與於一方而怨之後漢書注如食儀飫儀我也釋文雨雪麃麃外傳曣晛聿消曣晛日出也釋文菀柳上帝甚慆無自瘵焉外傳都人士首章毛氏有之三家則亡今韓詩實無此首章正義左傳襄十四年引行歸於周萬民所望服虔曰逸詩也采緑薄言覩者釋文白華泱泱白雲視我㤄㤄説文同孚吠反意不説好也釋文綿蠻綿蠻文貌嶭君章句緍文選注禮記作蠻何草不黃何人不鰥董氏云文王遏病也釋文大明天難諶斯外傳作諶説文天謂殷適使不俠四方外傳磬天之妹磬譬也正義釋文亮彼武王亮相也釋文同漢書檀車皇皇外傳綿瓞小瓜也釋文注文選周原腜腜莫來反文選注度填也皋門有閌閌盛貌釋文棫朴亹亹文王綱紀四方外傳旱麓國語作鹿魚喜樂則踴躍於淵中載設也嶭君章句文選注延于條枚外傳春秋同吕氏思齊古之人無擇董氏云皇矣其災其殪災反草也殪因也因髙填下也釋文維此王季今王肅注及韓詩亦作文王正義唯此文王春秋正義莫其德音左傳樂記同莫定也畔援武強也釋文羡願也四平曰陵嶭君章句文選注與爾隆衝仡仡搖也釋文靈臺文王聖德上及飛鳥下及魚鱉章句注文選辟雍者天子之學圓如璧壅之以水示圓言辟取辟有德不言辟水言辟雍者取其雍和也所以教天下春射秋饗尊事三老五更在南方七里之內立明堂於中五經之文所藏處蓋以茅草取其潔清也韓詩説正義無珠子曰矇珠子具而無見曰瞍文選注生民三王各正其郊韓詩説義禮記正薑姓原字韓詩章句史記注聖人皆無父感天而生異義齊魯義韓説正惟辭也誕信也文選注拂厥豐草拂弗也釋文或舂或抌董氏引韓詩周禮注同公劉芮􅠵之即􅠵讀與鞠同就言公劉止其軍旅欲使安靜乃芮􅠵之間漢書地理志注師古曰云云周禮注作汭泦板誘民孔易外傳蕩其命匪諶以無陪無側外傳飲酒閉門不出容曰湎釋文抑侯包云衛武公刺王室亦以自戒行年九十有五猶使臣日誦是詩而不離於其側正義遠猷辰告荒愖于酒告爾人民無言不酬子孫承承外傳嗚歎辭也文選注聿喪厥國釋文桑柔往以中垢外傳雲漢天子奉玉升柴加於牲上內傳璧禮記正義圭既卒是燔牲玉也鬱隆烔烔徒東切耗惡也後漢書注同憚苦也釋文如炎如焚後漢書注胡寧疹我以旱疹恥吝反重也釋文湯時大旱使人禱于山川韓詩傳公羊注君親之南郊以六事謝過自責曰政不一與民失職與宮室崇與婦謁盛與苞苴行與讒夫倡與公羊傳注傳疏云皆韓詩文蒸民夙夜匪懈外傳仲山甫徂齊封於齊漢書杜欽傳仲山父異姓之臣無親於宣就封於齊注鄧展曰韓詩以為封於齊嵩高王踐之事踐任也釋文韓奕有晫其道釋文幹正也嶭君章句文選注江漢肇長也釋文傳曰豫小子使爾繼邵公之後受命者必以其祖命之外傳常武敷敦淮濆敷大也敦迫民民翼翼釋文王猷允塞外傳召旻我居御卒荒外傳維天之命維念也釋文惟念也嶭君章句文選注烈文靡好也文選注天作彼徂者岐有夷之行徂往也夷易也行道也彼百姓歸文王者皆曰岐有易道可往歸矣易道謂仁義之道而易行故岐道阻險而人不難嶭君傳漢書注後傳曰岐道雖僻而人不遠彼岨者岐沈括引後漢書時邁薄言振之薄辭也振奮也莫無也震動也疊應也美成王能奮舒文武之道而行之則天下無不動而應其政教嶭君傳章後漢書注奮文選注嶭君句曰振猶也執競執服也釋文思文貽我嘉􅓿文選注􅓿外傳曰云云嶭君曰大麥也噫嘻帥時農夫穀類非一故言百也嶭君章句文選注振鷺西雍文王之雍也言文王之時辟雍學士皆潔白之人也嶭君章句後漢書注在此無射射厭也同上中庸同豐年陳穀曰秭釋文醴甜而不泲也文選注涔涔潛古今字正義涔魚池釋文注嶭君章句文選音岑閔豫小子惸惸在疚文選注敬之弗時仔肩外傳同説苑小毖懲苦也自求辛赦赦事也釋文翻飛貌文選注載芟繹繹盛貌文選注民民其麃衆貌釋文絲衣目羊來牛外傳般於繹思毛詩無此句齊魯韓詩有之釋文駉驒白馬黑髦也釋文泮水屈此羣醜屈收也收斂得此衆聚鬄彼東南鬄除也釋文獷彼淮夷獷覺寤之貌嶭君曰云云文文選注説作穬閟宮枚枚間暇無人之貌也稙長稼也稚幼稼也釋文騰乘也文選注句嶭君章荒至也釋文遂幠大東爾雅注疏曰或當在齊魯韓詩新廟奕奕奚斯所作奚斯魯公子也言其新廟奕奕然盛是詩公子奚斯所作也嶭君傳褒傳注後漢曹文選注曼長也文選注句嶭君章商頌美襄公史記宋世家襄公之時修仁行義欲與盟主其大夫正考甫美之故追道契湯高宗殷所以興作商頌注注韓詩章句美襄公正樂記溫良而能斷者宜歌商商宋詩正義揚子考甫常睎尹吉甫矣公子奚斯常睎正考甫矣玄鳥方命厥后奄有九域嶭君曰九域九州也文選注大糦大祭也釋文長發玄王桓發發明也釋文率禮不越外傳書説苑漢同至于湯躋外傳家禮記注詩讀湯齊為湯躋言三詩有讀為躋者正義聖敬日躋言湯聖敬之道上聞于天文選注為下國畷郵禮記注正義曰引齊魯韓詩也侯郵謂民之郵舍言成湯施布仁政為下國諸在畷民之處所使不離散武王載發外傳同荀子蘖絶也釋文殷武楚地在南郡南陽之間水經注詩按韓嬰敘云撻達也適數也釋文京師翼翼四方是則後漢書樊準傳翼注韓詩之文翼然盛也取松與柏間大也謂間然大也嶭君章句文選注缺青靜也寂無聲之貌也煦暖也嫕悅也祛去也介界也隤猶遺也章句注文選師臣者帝交友受臣者王孔子為魯司寇先誅少正卯謂佞道已行亂國政也佞道未行章明遠之而已內傳通白虎諸侯世子三年喪畢上受爵命於天子同上禘取毁廟之主皆升合食於太祖內傳義宗三禮魯詩魯申培公始為詩傳號魯詩申公受詩於浮丘伯伯者荀卿門人也魯最為近之獨以詩經為訓故以教亡傳疑者則闕弗傳漢志魯故二十五卷説二十八卷隋志魯詩亡於西晉而小學有一字石經魯詩六卷今殘碑百七十三字魏唐國風數篇之文又一段二十餘字零落不成文惟叔于田一章及女曰雞八字可讀其間有齊韓字蓋敘二家異同之説佩玉晏鳴關雎歎之漢書杜欽傳所李竒曰后夫人雞鳴佩玉去君周康王后不然故詩人歎而傷之臣瓚曰此魯詩也見後漢楊賜傳康王一朝晏起關雎見幾而作注此事魯詩今亡失矣先君之思以畜寡人此衛夫人定薑之詩也定薑無子立庶子衎是為獻公畜孝也獻公無禮於定薑定薑作詩言獻公當思先君定公以孝於寡人釋文曰此是魯詩禮記坊記注就正義鄭志答炅模云注記時盧君後後得毛傳乃改之中㝤之言漢書注博晉灼曰魯詩以為夜也集韻㝤雅夜也詩中㝤之言素衣朱綃儀禮士昏禮注宵讀為詩素衣朱綃之綃魯詩以綃為綺屬也禮記正義云魯詩為綃惟毛作維是褊心是以為刺誰知闕一字毛誰上有其之蓋亦勿思父兮父闕一字毛無曰嗟豫子行役夙夜毋已尚慎下闕哉猶來毋死兮毛作猗不稼不嗇欿欿伐輪兮毋食我黍三歲宦女莫我肯顧山有蓲毛樞胡不日鼓瑟石經魯詩殘碑天子食日舉樂諸侯不釋縣大夫士日琴瑟公羊傳注魯詩傳曰陽如之何爾雅注陽豫也魯詩云和鸞雍雍萬福攸同魯訓曰和設軾者也鸞設衡者也後漢輿服志注古有梁鄒者天子之田也文選注詩後漢書注魯傳曰此日而食于何不臧又曰閻妻扇方處漢書谷永傳閻妻驕扇日以不臧道顔師古曰魯詩小雅十月之交篇曰云云言厲王無內寵熾盛政化失理故致災異日為之食為不善也阮徂共皆為國名正義以魯詩之義云云鼐小鼎魯詩説説文殷中宗周成宣王皆以時毁正義匡異義詩魯説丞相衡以為云云齊詩齊轅固為傳應劭曰后蒼作齊詩漢志齊后氏故二十卷傳三十九卷孫氏故二十七卷傳二十八卷雜記十八卷隋志齊詩魏代己亡子之營兮遭我呼嶩之間兮漢書地理志臨災名營丘故齊詩曰云云顔師古曰毛詩作還齊詩作營之往也山嶩山名也字或作峱亦作巙音皆乃高反言往適營而相逢於嶩山也釋文本崔靈恩集注作嶩衛宣公之子壽閔其兄伋之且見害作憂思之詩黍離之詩是也洪邁容齊四筆家齊詩以為云云序論齊魯韓三以王風為魯詩朝氏詩亦見新序云夀閔其兄之且見害作憂思之詩黍離之詩是也四國是匡四國是皇賈董氏曰齊詩作四國是匡公彥引以為據詩云以雅以南韎任朱離後漢書陳忠云蓋注毛詩無韎任朱離之文見齊魯之詩也今亡自杜沮漆漢書地理志詩曰自杜自師古曰大雅綿之詩曰自土沮漆齊詩作杜言公劉避狄而來居杜與沮漆之地為下國駿駹董氏曰馬也齊詩謂翼奉曰竊學齊詩聞五際之要十月之交篇本傳孟康曰詩內傳曰五際卯酉午戌亥也隂陽終始際會之嵗於此則有變改之政也正義鄭作六藝論引春秋緯演孔圖云詩含五際六情詩緯泛歷樞云午亥之際為革命卯酉之際為改正辰在天門出入候聽卯天保也酉祈父也午采芑也亥大明也然則亥為革命一際也亥又為天門出入候聽二際也卯為隂陽交際三際也午為陽謝隂興四際也酉為隂盛陽微五際也其六情則春秋云喜怒哀樂好惡是也泛歷樞云大明在亥水始也四牡在寅木始也嘉魚在巳火始也鴻雁在申金始也而已郎顗傳四始之缺五際之厄奉又曰詩之為學情性匡衡曰聞之師曰匹配之際生民之始萬福之原婚姻之禮正然後品物遂而天命全孔子論詩以關雎為始言太上者民之父母后夫人之行不侔乎天地則無以奉神靈之統而理萬物之宜故詩曰窈窕淑女君子好仇言能致其貞淑不二其操情欲之感無介乎容儀宴私之意不形乎動靜夫然後可以配至尊而為宗廟主此綱紀之首王教之端也鄭伯好勇而國人暴虎念我皇祖陟降廷止言成王常思祖考之業而鬼神祐助其治也焭焭在疚言成王喪畢思慕意氣未能平也商邑翼翼云云此成湯所以建至治保子孫化異俗而懷鬼方也本傳衡學齊詩毋曰高高在上陟降厥士日監在兹言天之日監王者之處也乃眷西顧此維豫宅言天以文王之都為居也漢郊祀志匡衡奏議同爾弟兄與爾臨衝以伐崇庸伏湛曰文王受命而征伐五國必先詢之同姓然後謀於羣臣加占蓍龜以定行事故謀則成卜則吉戰則勝其詩曰帝謂文王詢爾仇方云云以爾鉤援云云崇國城守先退後伐所以重人命俟時而動故參分天下而有其二後漢書湛傳齊詩蕭望之曰爰及矜人哀此鰥寡上惠下也雨我公田遂及我私下急上也本傳望之治齊詩齊詩先采蘋而後草蟲曹氏詩説齊詩章句騶虞為天子掌鳥獸官解頤新語詩異字異義周南召南昔大王王季居岐山之陽躬行召南之教以興王業及文王而行周南之教以受命儀禮注塗山氏之女候禹于塗山之陽乃作歌曰候人兮猗實始作為南音周公召公取風焉以為周南召南呂氏春秋其地在南郡南陽之間水經注二南國按韓嬰敘詩云關雎康王晏出朝關雎預見列女傳康王晚朝關雎作諷後漢書昔周王承文王之盛一朝晏起夫人不鳴璜宮門不擊柝關雎之人見幾而作後漢紀楊賜上書周康之時頌聲作乎下關雎作乎上習治也故習治則傷始亂也揚子周道缺詩人本之衽席關雎作又曰周室衰而關雎作史記國風之好色也其傳曰盈其欲而不愆其止其誠可比於金石其聲可內於宗廟荀子在河之州説文槮差荇菜同上展轉反則楚辭章句關關雎鳩文選注人主不正應門失守故歌關雎以感之後漢注春秋説題辭葛覃服之無射禮記卷耳菤耳爾雅頃筐易滿也卷耳易得也然而不可以二周行荀子能官人也王及公侯伯子男甸采衛大夫各居其列所謂周行也左傳酌彼金􅪖漢書注我夃酌彼金罍陟彼岨矣説文云何盱矣爾雅注樛木葛藟虆之楚辭章句葛藟之説文桃夭桃之枖枖説文又作其葉溱溱通典罝糾糾武夫後漢書注天下有道則公侯能為民干城而制其腹心左傳芣苡蔡人之妻作列女傳王肅引周書云芣苡如李出於西戎王基駮云遠國異物非周婦人所得采正義自關雎至芣苡后妃房中之樂同上王肅云汝墳周南大夫妻作列女傳遵彼汝濆爾雅注魴魚赬尾説文王室如毁列女傳草蟲蛗螽爾雅注孔子曰未見君子止我心則悅詩之好善道之甚也如此説苑采蘋于以采薻説文室濟澤之阿行潦之蘋藻置之宗季蘭尸之敬也左傳甘棠勿鬋勿伐邵伯所茇漢書作廢説文召伯所稅爾雅注勿剪勿扒亦作拜廣韻孔子曰吾於甘棠見宗廟之敬也説苑行露申人女作列女傳小星實命不猷爾雅注維參與昴集韻何彼襛矣言齊侯嫁女以其母王姬始嫁之車遠送之鄭針膏肓故儀禮疏彼取三家詩與毛詩異騶虞成王因先王之樂命曰騶虞墨子樂官備也禮記也射義注一發五豝喻得賢者多于嗟乎騶虞嘆仁人也騶虞或作吾劉芳詩義疏柏舟衛宣夫人作列女傳威儀逮逮禮記注漢書威儀棣棣不可算也朱穆傳注論穆集載絶交云晤辟有摽説文我心非石我心非席列女傳棣棣富也不可選衆也賈誼新書燕燕衛定薑送婦作列女傳擊鼓擊鼓其鼞説文雄雉遙遙我思説苑匏有苦葉苞有苦葉周禮注苦匏不材於人共濟而已國語叔嚮曰注不裁於人言不可食也共濟而已佩匏可以度水也深則砅説文雍雍鳴鹽鐵論旴日始旦易釋文詩姚氏引谷風湜湜其止説文我躬不説左傳我今不閲皇恤我後禮記扶服救之禮記救漢書作能不我慉説文既詒我肄爾雅或作勩孫炎曰習事之勞式微黎莊夫人及傅母二人作列女傳陳婦道胡為乎中路同上旄丘留離之子爾雅注泉水䎵彼泉水説文也直視靜女靜女其袾又作􅩱僾而不見説文靜女之三章取彤管焉左傳新臺新臺有玭得此􅖚􅠴説文䁙婉之求同上二子乘舟伋方乘舟時伋傅母恐其死也閔而作詩新序柏舟紞彼兩髦説文君子偕老褘褘它它爾雅音義鬒髮如雲説文不屑鬄也周禮注玉之瑱兮是褻袢也邦之媛兮説文鶉之奔奔鵲之薑薑禮記鶉之賁賁注云薑薑賁賁爭鬭惡貌也言我以惡人為君亦使我惡如大鳥薑薑於上小鳥賁賁於下定之方中騋牝驪牡説文相鼠妻諫夫之詩白虎通何不遄死史記干旄竿旄何以告之取其忠也左傳竿旄之忠告家語彼姝者子何以與之其傳曰譬猶練絲染之藍則青染之朱則赤論衡載馳大夫軷涉儀禮疏言采其莔説文繫傳淇奧瞻彼淇澳菉竹猗猗赫兮喧兮有斐君子終不可喧兮禮記赫兮愃兮充耳璓瑩䯤辨如星説文碩人莊薑傅母作列女傳衣綿絅衣同上檾衣説文衣錦尚蘏書大傳衣綿尚絅禮記覃公惟私白虎通齒如瓠棲爾雅注首好貌説文翟蔽以朝周禮注施罟又作泧鱣鮪鮁鮁説女氓敦丘爾雅注如覆敦者波涕漣漣楚辭章句履無咎言禮記注履禮也漸車幃裳儀禮疏信誓􅘔􅘔説文芄蘭芄蘭之枝説文説苑童子佩鐫周禮視侵注河廣企豫望之楚辭章句孔子曰吾於河廣知德之至也鹽鐵論伯兮安得萱草説文焉得萱草爾雅音義木瓜下報上賈誼以為下之報上朝氏詩序論黍離彼黍䅻䅻説文愮愮爾雅搖搖君子于役雞棲于時羣經音辨君子陽陽左執翳説文中谷有蓷其乾矣説文爰雉離于罦説文覆車也雉離于罦漢書注大車息君夫人作列女傳大車噋噋廣韻毳衣如􅣞毳衣如􅨷説文大叔于田兩驂如儛家語火列具舉文選注膻裼暴虎説文清人左旋右搯説文遵大路無我兮説文有女同車顔如蕣華説文佩玉鏘鏘楚辭章句風雨風雨湝湝説文子襟子䘳石經􅠭兮達兮説文出其東門縞衣䌆巾説文之一作綥渠反溱洧潧與洧説文溱與洧方灌灌兮士與女方秉菅兮恂盱且樂漢書鄭詩二十一篇説婦人者十九公羊疏許氏云還遭我乎猺之間兮水經注並驅從兩豜兮説文三嵗豕肩相及者著俟我於著乎而漢書顔師古注著地名出濟南郡著縣也甫田婉兮兮説文莠喬喬揚子猗嗟猗嗟䫤兮集韻葛屨宛如左僻説文好人媞媞楚辭章句陟岵猷來無棄爾雅注伐檀河水清且灡漪爾雅山有樞它人是偷漢書注文選杕杜獨行焭焭文選注駟驖四驖孔阜輶車鑾鑣載獫猲獢説文小戎􅫑以觼軜厹矛沃説文竹柲緄縢儀禮注竹䪐緄縢周禮注愔愔良人列女傳蒹葭泝洄泝遊爾雅終南有屺有堂崔靈恩晨風彼鷐風説文宛彼北林周禮注隰有樹檖説文無衣與子皆行漢書權輿胡不承權輿爾雅注宛丘子之蕩兮楚辭章句亡冬亡夏漢書東門之枌市也媻娑説文東門之池可與寤言列女傳墓門墓門有梅列女傳歌陳辨女為誶豫不顧楚辭章句防有鵲巢邛有旨鶪説文又作月出佼人劉兮羣經音辨澤陂有蒲與茄樊光注爾雅碩大且媕説文嶭君曰重頤也韓詩檜鄶左傳在季札觀樂豳在齊下秦魏唐上鄶曹終焉素冠棘人臠臠兮説文隰有萇楚旖旎其華楚辭章句匪風匪車兮説文溉之釜鬵同上蜉蝣衣裳蜉蝣堀閲説文候人何戈與綴禮記注彼記之子禮記泥注汙澤善居水之中在魚梁以不濡汙其翼為才如君子以稱其服為有德詩禮注不同彼已國語嬒兮蔚兮説文色嬒女黑也鳲鳩尸鳩漢書尸鳩在桑傳曰尸鳩之所以養七子者一心也君子所以理萬物者一儀也説苑其辨伊綦周禮注􅋒説文作七月一之日滭冹説文從仌四之日舉止饁彼南畝漢書七月鳴鵙孟子注四月秀葽劉向説此味苦苦葽也説文獻肩于公周禮注肩四嵗為塞鄉墐戶儀禮疏聿為改歲漢書食鬱及蒮説文黍稷穜稑周禮注黍稷種稑種先穜後孰也稑疾孰也納于隂説文四之日其早稱彼兕觥受福無疆禮記注鴟梟殆天之未隂雨家語天之未隂雨説文唯豫音之嘵嘵同上刺邠君曾不如此鳥孟子注東山零雨其蒙楚辭章句霝雨其濛蜎蜎者蜀雚鳴于垤説文也小爵熠熠宵行同上光也熠盛破斧四國是訛爾雅注狼跋載躓其尾赤舄掔掔又作已已説文鹿鳴仁義陵遲鹿鳴刺焉史記嘉賔既來示我以善道又樂嘉賓有孔昭之明德鄭注鄉飲酒禮視民不佻説文左傳四牡駟牡騑騑儀禮疏痑痑駱馬説文驒漢書注作驒皇皇者華侁侁征夫楚辭章句莘莘征夫我馬唯驕説文周爰咨謨淮南子常棣召穆公思周德之不類故糾合宗族于成周而作詩左傳萼不説文鶺鴒在原左傳外禦其侮國語周文公之詩曰飲酒之説文和樂且耽禮記伐木伐木所所樽樽舞我竷竷舞我説文周德始衰頌聲既寢伐木有鳥鳴之刺後漢注蔡雍正交論天保潔蠲為饎周禮疏注大戴禮礿祠蒸嘗禮記注采薇懿王時戎狄交侵中國被其苦詩人始作疾而歌之曰靡室靡家獫允之故漢書胸奴傳彼薾惟何説文出車宣王征伐詩人美大其功曰薄伐獫允至于太原出車彭彭城彼朔方漢書出輿彭彭史記詩襄王之我出我輿荀子魚麗物其指矣唯其偕矣荀子南陔至由儀其義未聞儀禮注鄭君注禮之時未見毛傳以為此篇孔子前亡注詩之時既見毛傳以為孔子後失堂上歌者不亡堂下笙者即亡同上疏注禮之時未見此序故云義未聞也漢世毛學不行三家不見詩序不知六篇亡失謂其唯有三百五篇正義南山有臺樂旨君子邦家之基左傳美注言君子樂之道蓼蕭和鸞噰噰萬福攸同言動以紀度則萬福之所聚也賈誼新書六月獫狁孔熾我是用戒鹽鐵論薄伐獫狁至於太原史記詩襄王之吉甫宴喜千里之鎬猶以為遠漢書采芑朱紼斯皇白虎通振旅嗔嗔説文嘽嘽推推征伐獫狁荆蠻來威漢書車攻東有甫草羣書音辨薄狩於敖後漢書注經東京賦水注薄狩于敖赤紼金舄白虎通抉拾既次周禮注夬拾既次集韻助我舉㧘説文吉日既禡既禱説文麀鹿噳噳上其麎孔有爾雅疏伾伾俟俟説文庭燎鑾聲鉞鉞説文鶴鳴他山之石可以為説文我行其野不惟舊因白虎通誠不以富論語斯干周德既衰而奢侈宣王賢而中興更為儉宮室小寢廟詩人美之斯干之詩是也上章道宮室之如制下章言子孫之衆多也漢書傳劉向約之格格周禮注載衣之􅠷説文節南山維石嚴嚴音巖音辨羣經天方薦㽨説文秉國之鈞漢書天子是庳卑民不迷荀子不自為正禮記不自為政王肅云言政不由王出也正義正月民之訛言謂地蓋厚不敢不趚胡為虺蜥説文燎之方陽能或滅之漢書亦孔之昭禮記協比其鄰左傳彼有屋説文速速方轂後漢書哀此焭獨楚辭章句十月之交日有蝕之日月鞠凶山冢卒崩皮司徒中術膳夫掫子內史萭師氏漢書橛維趣馬漢書注維師氏集韻艷妻傓方處説文密勿從事讒口嗸嗸漢書僔沓背憎説文悠悠我悝爾雅注攸攸我里爾雅音義詩傳曰月食非常也比之日食猶常也日食則不臧矣漢天文志雨無正聽言則對新序漢書唯躬是瘁左傳小旻歙歙訿訿漢書翕爾雅作翕吸吸呰呰荀子膴王肅讀為幠幠大也無大有人言少也正義或哲或謀漢書不可暴虎不敢慿河鹽鐵論戰戰矜矜左傳小宛鳩飛國語秦伯賦鳩飛注小宛之首章也明發不寐有懷二人文王之詩也禮記螟􅘾有子􅝻螺負之説文毋忝爾所生古文孝經小辨小卞音盤漢書伯竒仁人而父虐之故作小辨之詩曰何辜于天親親而悲怨之辭也趙岐孟子注伯竒放流首髮早白詩云惟憂用老論衡譬彼瘣木説文巧言僭始既涵説文卭勞也禮記注大猷説文秩秩大繇聖人謨之漢書注躍躍毚兔遇犬獲之他人有心余忖度之史記居河之湄爾雅注既微且説文巷伯緀兮斐兮緀白文貌咠咠幡幡説文取彼讒人禮記注書後漢谷風棄我如遺新序蓼莪蓼莪蓼蓼者儀隸釋漢碑瓶之矣説文皞天罔極漢書大東周道如底孟子其平如砥苕苕公子行彼周道楚辭章句哀我疸人爾雅注㻆㻆佩璲爾雅疏彼織女説文四月於四月見孝子之思祭孔叢子奚其適歸家語匪鷻匪􅧭説文北山普天之下左傳孟子率土之賓或宴宴居息或盡悴事國漢書憔左傳作悴小明毋常安息漢書鼓鍾憂心且怞説文楚茨楚薺禮記注楚楚者薋楚辭章句我藝黍稷説文祝祭于􅤶同上信南山既瀀既渥取其血膫説文甫田或藝或芓黍稷擬擬漢書大田以我剡耜爾雅注去其螟蟘有淹淒淒説文有暗淒淒興雲祁祁吕氏春秋瞻彼洛矣韎韐有赩白虎通裳裳者華唯其有之新序傳曰君子者無所不宜也説苑桑扈受福不儺兕觥其觓説文匪徼匪傲漢書匪交匪敖左傳頍辨先集維霰爾雅注樂酒今昔楚辭章句車舝展彼碩女列女傳高山卬止説文景行行之史記詩之好仁如此禮記青蠅謍謍青蠅止于樊説文止于蕃史記止于藩愷悌君子毋信讒言讒言罔極漢書于又云至藩賔之初筵威儀佖佖仄辨之俄屢舞姕姕説文采菽采叔國語王賜諸侯命服之樂也國語注何錫與之白虎通觱沸濫泉説文赤紼在股白虎通匪交匪舒荀子樂旨君子殿天子之邦樂旨君子福祿攸同便蕃左右亦是帥從左傳紼縭維之爾雅優哉遊哉聊以卒歲左傳亦是戾矣蓋師讀有異角弓民胥效矣左傳雨雪麃麃見晛聿消漢書同荀子宴然聿消莫肯下隧式居屢驕荀子為注隧讀隨菀柳上天甚神無自瘵也戰國䇿都人士狐裘黃裳萬民之望賈誼新書黃衣則狐裘大蠟之服也禮記注采緑終朝采菉楚辭章句黍苗道邵伯述職勞來諸侯也國語注隰桑瑕不謂矣禮記胡注瑕之言也白華白華漢書淲沱北流説文别徐鉉曰沱沼今作池非是瓠葉有菟斯首後漢注漸漸之石俾滂池矣史記文王其命維新禮記陳錫載周是不布利而懼難乎故能載周以至于今國語本枝百世左傳惟周之士不顯奕世後魏禮志孔子論詩至於殷士膚敏祼將于京喟然歎曰大哉天命善不可不傳於子孫是以富貴無常不如是則王公其何以戒愼民萌何以勸勉蓋傷微子之事周而痛殷之亡也漢書毋念爾祖左傳經古孝述修厥德漢書儀監于殷峻命不易禮記上天之載載讀曰栽謂生物也禮記注大明天難諶斯不易惟王漢書聿嬪于京爾雅注唯此文王允懷多福春秋繁露在郃之陽其旝如林説文毋二爾心漢書坶野洋洋水經注四騵彭彭公羊疏案異義綿陶􅠈陶穴説文至於岐下聿來相宇新序爰挈我龜漢書注亦不殞厥問孟子畎夷喙矣左傳注犬夷呬矣昆夷駾矣説文豫聿有奔走豫聿有先後楚辭章句棫朴左右趨之此言左右日以善趨也賈誼新書左右趨之蒸徒楫之左右奉璋此文王之郊也六師及之此文王之伐崇也以是見文王之先郊而後伐也春秋繁露追琢其璋周禮注雕琢其章亹亹我王荀子旱麓瞻彼旱鹿夫旱鹿之榛楛殖故君子得以易樂干祿焉國語璱彼玉瓚説文恤周禮注作彼凱弟君子吕氏春秋禮記葛纍後漢書思齊神罔時侗説文雍雍在宮漢書注厲假不瑕集韻皇矣求民之瘼漢書惟彼二國其政不獲惟此四國爰究爰度左傳乃眷西顧此惟豫度論衡唯此文王王此大國左傳無然畔換漢書注以遏徂莒以篤周祜孟子弗識弗知賈誼新書崇墉説文克順克俾俾于文王禮記靈臺白鳥鶴鶴孟子作賈誼新書皓皓臣業維樅説文矇瞍奏工楚辭章句文王有辟雍之樂莊子文王樂名巨業樂苑下武應侯愼德家語子淮南昭哉來許漢碑昭兹來御愼其祖父後漢書注文王有聲欥求厥寧説文匪革其猶聿追來孝注革急也猶道也聿求也言文王改作者非必欲急行己之道乃追述先祖之業來屋此為孝考卜惟王度是鎬京惟龜正之注度謀也禮記既伐于崈書大傳芑枸檵也禮記注生民不􅠂不疈克岐克㘈禾穎穟穟瓜瓞菶菶説文瓜瓞集韻即有台家室白虎通誕降嘉榖惟秬惟秠説文或舂或枕儀禮注或簸或舀杼臼也蒸之烰烰説文淅之溞溞爾雅音義后稷兆祀集韻行葦維葉柅柅文選注肆筵設機楚辭章句鮐背爾雅既醉類者不忝前哲壼者廣裕民人萬年者令聞不忘祚胤者子孫蕃育之謂也國語鳬鷖公尸來燕醺醺説文假樂嘉樂左傳公賦嘉樂嘉樂君子憲憲令德禮記正義云案詩本文憲憲為顯顯與此不同者齊魯韓詩與毛詩不同也保佑命之禮記不愆不忘文選注亡説苑作不騫不忘春秋繁露不解於位漢書公劉􅋠戢用光孟子于邠斯觀白虎通汭𨸰之即周禮注泂酌可以饙饎説文凱弟君子禮記卷阿嗣先公爾酋矣祓祿康矣爾雅注噦噦其羽説苑民勞迄可小康漢書朁不畏明説文曾也板下民卒􅓠禮記是用大簡左傳無然呭呭詍詍説文泄泄爾雅辭之繹矣説苑勿用為笑荀子歡歡爾雅民之方念㕧説文介人惟藩大師惟垣毋俾城壞毋獨斯畏漢書敬天之威不敢驅馳後漢楊東傳蕩天命匪忱説文曾是強圉漢書注爾德不明以亡陪亡卿不明爾德以亡背亡仄漢書式號式呼漢書殷鑒不遠近在夏后之世國語抑衛武公作懿戒以自警注懿讀曰抑國語惟德之隅漢書有梏德行禮記荒沈于酒漢書誥爾民人鹽鐵論愼爾侯度左傳白圭之㓠説文亡德不報惟民之則漢書不愆于儀禮記我心懆懆五經文字誨爾忳忳禮記注藉曰未知漢書桑柔國步斯矉説文告女憂恤誨女序爵誰能執熱鮮不用濯墨子胡此畏忌漢書泰風有隧爾雅注雲漢昭回於天王曰嗚呼飢饉洊臻耗射下土春秋繁露先祖於摧爾雅注􅣛􅣛山川有其聲説文嵩高嵩髙惟嶽峻極于天生甫及申禮記注言周道將興五嶽為之生賢佐仲山甫及申伯正義案鄭志注禮在先未得毛詩傳錫爾玠圭爾雅注申伯番番既入于徐楚辭章句伯徐周宣王之舅申所封蒸民天生蒸民民之秉夷孟子不畏強圉漢書唯仲山甫補之左傳四牡駫駫四牡騯騯説文韓奕王賜韓侯周禮注鉤膺鏤鐊説文邊豆有且集韻姪娣從之白虎通今涿郡方城縣有韓侯城水經注王肅曰云云江漢武夫潢潢鹽鐵論肇敏戎公後漢周舉傳弛其文德協此四國禮記注弛施也協和也常武既警既戒周禮注敦彼淮濆説文瞻卬女反脫之後漢書懿厥哲婦匪降自天漢書人伎忒説文舍爾介逖説文邦國殄悴漢書召旻昔者先王受命有如召公之臣正義清廟頌言成也一章成篇宜列德故登歌清廟一章也後漢祭祀志曰注東平王蒼議詩傳云云於者歎之也穆者敬之也清者欲其在位者遍聞之也故周公升歌文王之功烈德澤苟在廟中見文王者愀然如見文王尚書大傳肅然清靜謂之清廟賈逵左傳注逡奔走在廟禮記注無斁於人斯禮記維天之命子思論詩於穆不已孟仲子曰於穆不似正義譜云惟天之命禮記誐以溢我説文誐以謐我廣韻説文何以恤我我其收之左傳逸詩注云烈文無競惟人四方其順之左傳不顯惟德於戲前王不忘禮記天作岐有夷之行子孫其保之説苑昊天有成命是道成王之德也成王能明文昭能定武烈者也夫道成命者而稱昊天翼其上也二后受之讓於德也成王不敢康敬百姓也夙夜恭也夙夜其命宥密禮記宥謐謐者寧也億也命者制令也基者經也成王者武王之子文王之孫也文王有大德而功未就武王有大功而治未成及成王承嗣仁以臨民故稱昊天焉不敢怠安蚤興夜寐以繼文王之業賈誼新書叔向曰緝熙亶厥心亶厚也國語我將儀式刑文王之德左傳時邁肆夏時邁也周禮注云呂叔玉執競繁遏執傹也周禮注云呂叔玉鍾鼓鍠鍠磬管鏘鏘説文又作蹡蹡漢書思文渠思文也周禮注呂叔玉云渠國語金奏肆夏繁遏飴我釐牟漢書振鷺振羽禮記客出以雍徹以振羽注振羽振鷺有瞽應􅉧縣鼓周禮注肅雍和鳴禮記肅爾雅注作噰雍雍論語禮記有來雍雍漢書及徹帥學士而歌徹周禮注徹者歌雍載見鞗革有瑲説文武無競惟烈左傳閔豫小子煢煢在㝌説文陟降廷止漢書常注言成王念文王武王之德奉而行之故鬼神上下臨其朝廷敬之天惟顯思左傳小毖夆爾雅云孫炎曰謂相掣曳入於惡也辛王肅以言才薄莫之藩援則自得毒孫育云羣臣無肯牽引扶助我則自得辛螫之毒良耜其鎛斯挑集韻注周禮既茠荼蓼䆅之秩秩説文䆅積禾也絲衣素衣其紑辨服俅俅説文戴辨俅俅爾雅注自堂徂基自羊徂牛言以內及外以小及大也説苑鼐鼎及哉史記音義哉音資不虞不驁史記酌汋荀子左傳勺儀禮漢禮記書桓屢豐年左傳武王作武其六曰蓋注此三六之數與今詩頌篇次不同楚樂歌之次第賚鋪時繹思我徂惟求定左傳武王作武其三曰般於皇明周白虎通駉在駉之野有驈有騜説文泮水薄采其荇白虎通其旗伐伐羣經音辨言采其􅛄説文在頖獻馘禮記注束矢其􅊧説文閟宫稙稚叔麥實始戩商説文王謂叔父禮記注戎狄是應荆荼是徵史記周公方且膺之孟子是周公所膺也音義應訓當注膺擊也太山巖巖魯侯是瞻説苑寢廟奕奕蔡雍獨斷周禮注作繹繹那那國語以那為首鼗鼓鼘鼘説文先聖王之傳恭猶不敢專稱曰自古古曰在昔昔曰先民國語烈祖亦有和説文亦有盉羮説文通釋奏假無言禮記鬷嘏無言左傳玄鳥惟民所止禮記百祿是荷左傳長發海水有􅎒漢書至于湯齊禮記注讀為躋聖敬日齊注聖敬日莊嚴上釋文仄皆反同湯降不遲降有禮之謂也國語布政優優左傳憂説文百祿是揫説文為下國駿蒙荀子為下國恂蒙何天之寵傅奏其勇大戴禮武王載坺説文武王載發荀子則莫我敢遏漢書包有三枿漢書注韋鼓漢書殷武冞入其阻説文命于下國為下國所命為天子左傳注四方是極後漢書逸詩支天之所支不可壞也其所壞亦不可支也國語周詩有之曰云云昔武王克商而作此詩也以為飫歌名之曰支以遺後之人使永監焉貍首曾孫侯氏四正具舉大夫君子凡以庶士小大莫處御于君所以燕以射則燕則譽禮記注諸侯之射節周禮諸侯以貍首為節注貍首在樂記諸儀禮注貍首逸詩曽孫也貍之言不來也其詩有射侯首不朝者之言大戴禮凡雅二十六篇其八篇可歌歌鹿鳴貍首鵲巢采繁采蘋伐檀白駒騶虞八篇廢不可歌七篇商齊可歌也三篇間歌貍首之斑然執女手之卷然禮記轡之柔矣馬之剛矣轡之柔矣馬亦不剛轡亦不柔志氣麃麃取與不疑周書柔左傳國子賦轡之矣注見周書驪駒驪駒在門僕夫具存驪駒在路僕夫整駕大戴禮駒漢書王式傳歌驪注文選注同祈招祈招之愔愔式昭德音思我王度式如玉式如金形民之力而無醉飽之心左傳穆王欲肆其心周行天下祭公謀父作祈招之詩以止王心家語形作刑徵招角招畜君何尤孟子齊景公召太師曰為我作君臣相説之樂蓋徴招角招是也其詩曰麥秀麥秀漸漸兮禾黍油油彼狡僮兮不與我好兮史記箕子作麥秀之詩九夏王夏祴肆夏驁昭夏周納夏九章夏詩齊夏頌族夏夏夏禮注夏皆篇名之族類也繁遏渠國語先樂金奏肆夏繁遏渠天子所以饗元侯也注肆夏一名樊昭夏一名遏納夏一名渠采薺周禮行以肆夏趨以采薺注樂名或曰逸詩禮記作采齊招雍肆夏孝成尚書大傳維五紀奏鍾石論人聲招樂興於大麓之野報事還歸二年􅨳然乃作大唐之歌招為賔客雍為主人始奏肆夏納以孝成新宫儀禮燕禮下管新宫新注小雅逸篇左傳宋公賦新宫大射儀乃管宫三終注管謂吹蕩以播新宫之樂斯朱文公曰或曰恐即干詩鳩飛國語秦伯賦鳩飛注謂小宛之首章河水左傳晉公子賦河水國語注河當作沔九德之歌周禮明明崇禹生開周書世俘篇禹籥人奏武萬獻明明三終奏崇生開三終注詩篇名武宿夜禮記舞莫重於武宿夜卒注武曲名舞正義武王至商郊停止宿夜士皆歡樂歌以待旦故名焉茅鴟左傳注王誦茅鴟刺不敬缺巧笑倩兮美目盼兮素以為絢兮唐棣之華偏其反而豈不爾思室是逺而論語翹翹車乘招我以弓豈不欲往畏我友朋雖有絲麻無棄菅蒯雖有姬薑無棄蕉萃凡百君子莫不代匱周道挺挺我心扄扄講事不令集人來定俟河之清人壽幾何兆云詢多職競作羅周詩曰有之我無所監夏后及商用亂之故民卒流亡禮義不愆何恤於人言淑慎爾止無載爾偽我之懷矣自詒伊戚左傳相彼盍旦尚猶患之昔吾有先正其言明且清國家以寧都邑以成庶民以生誰能秉國成不自為正卒勞百姓禮記皇皇上天其命不忒天之以善必報其德家語四牡翼翼以征不服九變復貫知言之選漢書浩浩者水育育者魚未有室家而安召我居管子浩浩白水倏倏之魚君來召我我將安居國家未定從我焉如列女傳古有白水之詩鳳凰秋秋其翼若干其聲若簫有鳳有凰樂帝之心如霜雪之將將如日月之光明為之則存不為之則亡國有大命不可以告人妨其躬身長夜漫兮永思騫兮大古之不慢兮禮義之不愆兮何恤人之言兮涓涓源水不壅不塞轂既破碎乃大其輻事以敗矣乃重大息墨以為明狐貍而蒼荀子將欲毁之必重纍之將欲踣之必高舉之唯則定國君君子則正以行其德君賤人則寬以盡其力無過亂門吕氏春秋魚在在藻厥志在餌大戴禮青青之麥生於陵陂莊子必擇所堪必謹所堪墨子樂矣君子直言是務晏子春秋木實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主服難以勇治亂以知事之計也立傅以行教少以學義之經也樹德莫如滋除害莫如盡行百里者半於九十大武遠宅不涉戰國䇿綿綿之葛在於曠野良工得之以為絺紵良工不得枯死於野皇皇上帝其命不忒天之與人必報有德説苑舟張辟雍鶬鶬相從八風回回鳯皇喈喈尚書大傳樂日云云登彼西山兮采其薇矣以暴易暴兮不知其非矣神農虞夏忽焉沒兮我安適歸矣吁嗟徂兮命之衰矣史記伯夷叔齊作歌可太史公曰睹軼詩異焉良弓之子必先為箕良冶之子必先為裘列子言古詩佞人如集韻得人者興失人者崩史記缺駕辨楚辭大招伏戲駕辨楚好商只曲古曲名文選注伏羲作琴始造此網罟隋樂志伏羲有網罟之詠下夏侯玄辨樂論伏羲氏因時興利教民田魚天歸之有網罟之歌豐年辨樂論神農教民食穀有豐年之詠八闋吕氏春秋葛天氏歌八闋一曰載民二曰玄鳥三曰遂草木四曰奮五穀五曰敬天常六曰達帝功七曰依地德八曰總萬物之極卿雲舜大尚書傳南風舜尸家語子晳陽南陽初慮朱于苓落歸來縵縵尚書大傳虞傳維元祀巡狩四嶽八伯每至其方各貢兩伯之樂其歌名云云後闕其一立我蒸民莫匪爾極不識不知順帝之則列子以為堯康衢童謠大夫曰古詩也普天之下莫非王土率土之濵莫非王臣吕氏春秋以為舜自為詩破斧吕氏春秋夏孔甲作為破斧之歌實始為東音燕燕同上有娀氏二女作歌一終曰燕燕往飛實始作為北音晨露同上湯命伊尹作為大濩歌晨露黃竹穆王傳穆天子補遺正義曰毛氏字與三家異者動以百數宵雅禮記宵雅肄三注宵小也奕奕梁山韓奕疏爾雅亦既遘止草蟲貉皇矣貊其德音漮賓之初筵康爵湯孫奏嘏那怡懌節南山那夷懌妉氓無與士耽詢溱洧洵亮柏舟不諒悴雨無正是瘁虺穨卷耳㾖十月悠悠我里逐考槃軸痱四月具腓噰噰鳴雁匏有苦葉䇓卬須㗉載芟有略其耜誃巷伯侈兮洵桑柔侯旬雍雍思齊雍雍憴憴抑繩繩憢憢鴟梟嘵嘵洋洋二子乘舟養養媞媞葛屨提提慅慅巷伯草草訰訰抑諄諄邈邈藐藐版版板蕩蕩蕩爞爞雲漢敖敖板嚻嚻瘐瘐正月愈愈殷殷同上殷殷郝郝載芟澤澤悽悽出車萋萋倏倏小辨踧踧歡歡板灌灌愮愮黍離搖搖泄泄板泄泄謞謞同上熇熇其虛其徐北風寤劈有摽柏舟幬小星禱悈靈臺亟棘文王有聲鞗革韓奕藲山有樞其椔其翳皇矣蘦采苓以茠蒤蓼良耜虋生民穈虉防有鵲巢鷊峐屺峐多草木岵無草木王肅解依爾雅焦護六月是禷是禡皇矣啓明大東騜駁其馬東山雅並爾東方昌矣雞鳴􅏎􅏎震電十月之交熠熠宵行東山滭沸濫泉采菽溯洄蒹葭説文六月食鬱及蒮爾雅疏韓詩云消搖逍遙臣鉉等案詩只用消搖此二字字林所加實覃實吁詒我來牟詞之矣惟葦及蒲鬻鼎實云云兄弟鬩于牆不不來説文若臨深淵若履薄氷吕氏春秋周書曰弇閟宫奄有長楚萇楚爾雅上天之縡揚雄傳􅯎􅜃漢碑􅯎􅜃衡門詩小雅之材七十四人大雅之材三十一人司馬相如傳掩羣雅注張揖曰莕關雎荇爾雅及河嶠嶽時邁子淮南魯詩傳曰古有梁騶天子獵之田也文選魏都賦注枹櫟爾雅葛藟皇甫士安以為桓王詩崔集注本亦作桓王釋文憂心㶣㶣説文子䘳石經皇荂莊子折楊皇荂本又作華其儀一也心如結也淮南子夫旱鹿之榛楛殖故君子得以易樂干祿焉國語憂心悄悄愠于羣小孔子也孟子姼姼好人提提書音義同漢關雎興於鳥而君子美之為其雌雄之不乖居也淮南子菡􅣿説文菡萏蒸然蟋􅢊觲觲角弓同上古之君子悲周道之衰頌聲之輟飾鼓以鷺存其風流有駜振振鷺隋樂志有狐綏綏齊詩作夕夕得此戚施韓詩薛君曰戚施蟾蜍喻醜惡也説文􅖚􅠴詹諸也韓詩説沉者曰蘋浮者曰薸音瓢節左傳季􅐥子賦節之卒章集注作五月鳴鵙王肅謂古字五如七因訛為之韓詩序曰關雎刺時也詩説靡所止疑齊詩作凝駉駉牡馬河北本作牧馬韓詩序夫栘燕兄弟也閔管蔡之失道也詩説夫栘之華萼不煒煒藝文類聚侈兮哆兮崔靈恩集注鉹兮哆兮説文娓娓文王集注宜犴宜獄周禮注築城伊淢字又作洫韓詩云洫深也釋文不僭不濫不敢怠皇命以多福左傳以妟父母駟牡䮸䮸説文憂心㶣㶣直廉切同上關雎畢公作補傳謂得之張超或謂得之蔡雍㿉頽説文菟兔置麟之止釋文或無之字説文緎二子乘舟伋之傳母恐其死也而作詩劉向新序説文榛衛宣公子壽閔其兄伋之見害作憂思之詩黍離是也新序鹿鳴者周大臣之所作也王道衰大臣知賢者幽隱故彈絃風諫文選注蔡雍琴操周室之衰其卿大夫緩於誼而急於利亡推讓之風而有爭田之訟故詩人疾而刺之曰節彼南山惟石巖巖董仲舒傳魏武公信讒詩刺之曰營營青蠅止于藩袁孝政注劉子周公旦乃作詩曰文王在上云云以繩文王之德吕氏春秋周公詠文王之德而作清廟王褒講德論周公與升歌而弦文武諸侯在廟中者伋然淵其志和其情愀然若復見文武之身尚書大傳取其宗祀之清貌則曰清廟蔡雍明堂論周文公之頌曰載戢干戈云云思文后稷云云國語武王因先王之樂又自作樂命曰象武墨子象謂周頌武也明堂位周公輔成王作汋樂以奉天春秋繁露以車驛驛釋文崔本不㕦不敖説文射義曰騶虞者樂官備也其詩有一發五豝五豵于嗟騶虞之言樂得賢者衆多嘆思至仁之人以充其官儀禮注敕爾瞽率爾衆工奏爾悲誦肅肅雍雍毋怠毋凶周禮鄭司農注云疏出曰似逸詩不知何從勺言能勺先祖之道也武言以功定天下也漢書頖宫郊之學也詩所謂頖宫也禮記注伐檀其詩刺賢者不遇明王也文選注張揖曰潛小爾雅作橬釋文不潛不濫不敢怠皇命以多福左傳缺詩四家異同唯韓詩略見於釋文而魯齊無所考劉向列女傳謂蔡人妻作芣苡周南大夫妻作汝墳申人女作行露衛宣夫人作邶柏舟定薑送婦作燕燕黎莊公夫人及其傅母作式微莊薑傅母作碩人息夫人作大車新序謂伋之傅母作二子乘舟壽閔其兄作憂思之詩黍離是也楚元王受詩於浮丘伯向乃元王之孫所述蓋魯詩也鄭康成注禮記以于嗟乎騶虞為嘆仁人以燕燕為定薑之詩以生甫及申為仲山甫申伯以商為宋詩維鵜在梁以不濡其翼為才上天之載讀曰栽至於湯齊讀為躋注周禮云甸讀與惟禹敶之之敶同康成從張恭祖受韓詩注禮之時未得毛傳所述蓋韓詩也賈誼謂騶文王之囿虞虞官也歐陽子從之韋昭注國語謂采菽王賜諸侯命服之樂黍苗道召伯述職勞來諸侯與朱子集傳合太史公以薄伐獫狁至於太原出輿彭彭城彼朔方為周襄王時之詩班固謂靡室靡家之詩懿王時作城彼朔方之詩宣王時作白虎通以相鼠為妻諫夫之詩趙岐以小辨為伯竒之詩漢儒言詩其説不一如此關雎正風之始也魯齊韓以為康王政衰之詩揚子云傷始亂鹿鳴正雅之始也太史公云仁義陵遲鹿鳴刺焉聖人刪詩豈以刺詩冠風雅之首哉揚子又云正考甫常睎尹吉甫矣公子奚斯常睎正考甫矣正考甫得商頌而以為作商頌奚斯作新廟而以為作魯頌此皆先儒所不取許叔重説文謂其稱詩毛氏皆古文也而字多與今詩異豈詩之文亦如書之有古今歟併綴而録之伯厚甫後序詩考
